spring:
  application:
    name: shopnest-api

  profiles:
    active: dev

  # ── Database ────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/shopnest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: shopnest_user
    password: ShopNest@2024
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ─────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  # ── Flyway ──────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ───────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Cache ───────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes in milliseconds
      cache-null-values: false

# ── Server ──────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ── Logging ─────────────────────────────────────
logging:
  level:
    com.shopnest: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# ── Security ────────────────────────────────────
app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000          # 24 hours in milliseconds
    refresh-expiration: 604800000 # 7 days in milliseconds